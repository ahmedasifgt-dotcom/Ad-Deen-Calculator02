<!-- ফ্যামিলি ট্রি গ্রিড লেআউট -->
<div class="glass-card">
    <div class="card-heading">🌳 লাইভ ফ্যামিলি ওয়ারিশ গ্রাফ (VISUAL FAMILY TREE)</div>
    <div class="family-tree-container">
        <!-- মাতা ও স্বামী/স্ত্রী কার্ড -->
        <div class="tree-row">
            <div class="member-card active-heir" id="card-mother">
                <div class="member-title">মাতা (Mother)</div>
                <div class="member-allocation" id="alloc-mother">২,০০,০০০ ৳</div>
            </div>
        </div>
        <div class="tree-row">
            <div class="member-card active-heir" id="card-spouse">
                <div class="member-title">স্বামী (Husband)</div>
                <div class="member-allocation" id="alloc-spouse">৩,০০,০০০ ৳</div>
            </div>
        </div>
        <!-- পুত্র ও কন্যা কার্ড -->
        <div class="tree-row">
            <div class="member-card active-heir" id="card-sons">
                <div class="member-title">পুত্র (Sons)</div>
                <div class="member-allocation" id="alloc-sons">৬,৫০,০০০ ৳</div>
            </div>
            <div class="member-card active-heir" id="card-daughters">
                <div class="member-title">কন্যা (Daughters)</div>
                <div class="member-allocation" id="alloc-daughters">১,৪০,০০০ ৳</div>
            </div>
        </div>
    </div>

    <!-- ইনপুট ফর্ম কন্ট্রোলস -->
    <div class="form-group">
        <label>মৃত ব্যক্তি কে?</label>
        <select>
            <option>পিতা (স্ত্রী মারা গেছেন)</option>
        </select>
    </div>

    <div class="form-group">
        <label>মোট বণ্টনযোগ্য সম্পত্তি</label>
        <input type="number" value="1200000">
    </div>

    <button class="action-btn">শরিয়াহ মোতাবেক সিমুলেট করুন</button>

    <!-- শরিয়াহ সতর্কীকরণ নোটিশ -->
    <div class="warning-box">
        <strong>⚠️ শরিয়াহ সতর্কীকরণ নোটিশ (Shariah Guard Note):</strong>
        <div class="warning-text-content">
            বাংলাদেশী সামাজিক ও পারিবারিক সংস্কৃতির দোহাই দিয়ে... (আপনার আগের নোটিশ টেক্সট)
        </div>
    </div>
</div>

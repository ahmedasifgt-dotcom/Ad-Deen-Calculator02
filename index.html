<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad-Deen Visual Miras Calculator</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        /* আপনার বর্তমান স্টাইলগুলো এখানে থাকবে */
        :root { --bg-gradient: linear-gradient(135deg, #041a10 0%, #092f1d 50%, #0f3f27 100%); --accent: #E6C25A; }
        body { background: var(--bg-gradient); color: #fff; padding: 20px; font-family: sans-serif; }
        .page { display: none; }
        .active-page { display: block; }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .action-btn { width: 100%; background: linear-gradient(135deg, #E6C25A 0%, #C9A43B 100%); border: none; border-radius: 12px; padding: 14px; color: #041a10; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; background: #0b2e1d; color: #fff; border: 1px solid #E6C25A; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="page1" class="page active-page glass-card">
        <h2>Ad-Deen Calculator</h2>
        <input type="text" id="user-name" placeholder="আপনার নাম">
        <input type="text" id="deceased-name" placeholder="মৃত ব্যক্তির নাম">
        <input type="number" id="total-estate-amount" placeholder="সম্পত্তির পরিমাণ (টাকা)">
        <button class="action-btn" onclick="saveDataAndGo()">ক্যালকুলেটরে যান</button>
    </div>

    <div id="page2" class="page glass-card">
        <h3>মীরাস সিমুলেটর</h3>
        <input type="number" id="estateValue" placeholder="মোট সম্পত্তি">
        <button class="action-btn" onclick="processMirasSimulation()">হিসাব করুন</button>
        <div id="resultsList"></div>
        <button class="action-btn" style="background:#666" onclick="location.reload()">ফিরে যান</button>
    </div>

    <script>
        // Firebase কনফিগারেশন
        const firebaseConfig = { databaseURL: "https://ad-deen-s-database-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);

        function saveDataAndGo() {
            const uName = document.getElementById('user-name').value;
            const amount = document.getElementById('total-estate-amount').value;
            
            // ফায়ারবেসে সেভ
            firebase.database().ref('miras_records/').push({ userName: uName, amount: amount });

            // পেজ পরিবর্তন
            document.getElementById('estateValue').value = amount;
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').style.display = 'block';
        }

        // আপনার ৫৫০ লাইনের ক্যালকুলেশন লজিকগুলো এখানে বসান
        function processMirasSimulation() { 
            /* আপনার লজিক এখানে */ 
        }
    </script>
</body>
</html>

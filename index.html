<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad-Deen Visual Miras Calculator</title>
    <!-- আপনার আগের CSS এখানে থাকবে -->
    <style>
        :root { --bg-gradient: linear-gradient(135deg, #041a10 0%, #092f1d 50%, #0f3f27 100%); --accent: #E6C25A; }
        body { background: var(--bg-gradient); color: #fff; padding: 20px; font-family: sans-serif; }
        .page { display: none; }
        .active-page { display: block; }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .action-btn { width: 100%; background: linear-gradient(135deg, #E6C25A 0%, #C9A43B 100%); border: none; border-radius: 12px; padding: 14px; color: #041a10; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        input, select { width: 100%; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: #fff; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- পেজ ১ -->
    <div id="page1" class="page active-page glass-card">
        <h2 style="color:var(--accent)">Ad-Deen Calculator</h2>
        <label>আপনার নাম:</label>
        <input type="text" placeholder="আপনার নাম লিখুন">
        <label>মৃত ব্যক্তির নাম:</label>
        <input type="text" placeholder="মৃত ব্যক্তির নাম লিখুন">
        <button class="action-btn" onclick="document.getElementById('page1').classList.remove('active-page'); document.getElementById('page2').classList.add('active-page');">ক্যালকুলেটরে যান</button>
    </div>

    <!-- পেজ ২ -->
    <div id="page2" class="page">
        <!-- এখানে আপনার আগের সেই ৫৫০ লাইনের মেইন ক্যালকুলেটরের কোডটি বসান -->
        
        <!-- ফিরে যান বাটনটি নিচে দেওয়া হলো -->
        <button class="action-btn" onclick="document.getElementById('page2').classList.remove('active-page'); document.getElementById('page1').classList.add('active-page');">ফিরে যান</button>
    </div>
</div>

</body>
</html>

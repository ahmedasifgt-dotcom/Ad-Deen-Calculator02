<!DOCTYPE html>
<html lang="bn">
<head>
    <!-- আপনার আগের CSS এখানে থাকবে -->
    <style>
        .page { display: none; }
        .active-page { display: block; }
        /* বাকি CSS আগের মতোই থাকবে */
    </style>
</head>
<body>

<div class="app-container">
    <!-- পেজ ১: ইন্ট্রো এবং বেসিক ডাটা -->
    <div id="page1" class="page active-page glass-card">
        <header><h1>Ad-Deen Calculator</h1></header>
        <div class="form-group">
            <label>আপনার নাম:</label>
            <input type="text" placeholder="আপনার নাম লিখুন">
        </div>
        <div class="form-group">
            <label>মৃত ব্যক্তির নাম:</label>
            <input type="text" placeholder="মৃত ব্যক্তির নাম লিখুন">
        </div>
        <button class="action-btn" onclick="goToPage2()">ক্যালকুলেটরে যান</button>
    </div>

    <!-- পেজ ২: মেইন ক্যালকুলেটর (আপনার আগের পুরো কোডটি এখানে বসবে) -->
    <div id="page2" class="page">
        <!-- এখানে আপনার আগের ক্যালকুলেটরের সেই পুরো অংশটি বসিয়ে দিন -->
        <button class="action-btn" onclick="goToPage1()" style="background:#555;">ফিরে যান</button>
    </div>
</div>

<script>
    function goToPage2() {
        document.getElementById('page1').classList.remove('active-page');
        document.getElementById('page2').classList.add('active-page');
    }

    function goToPage1() {
        document.getElementById('page2').classList.remove('active-page');
        document.getElementById('page1').classList.add('active-page');
    }
    
    // আপনার আগের সব জাভাস্ক্রিপ্ট ফাংশনগুলো এখানে নিচে বসবে
</script>
</body>
</html>
